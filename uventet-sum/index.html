<!DOCTYPE html>
<!-- data-ds-color-mode: aktiverer Designsystemetets lyse fargepalett -->
<html lang="nb" data-ds-color-mode="light">
<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Fordel en uventet inntekt mellom sparing, gjeld og noe gøy.">
  <title>Uventet sum — Pengeprat</title>

  <!-- Inter-font (Designsystemet bruker Inter som standard) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">

  <!-- Designsystemet + egne stiler -->
  <script type="module" src="/src/main.js"></script>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="container">
    <div class="main-frame">

      <a href="../" class="back-link">← Oversikt</a>
      <h1>Uventet sum</h1>
      <p style="margin-bottom: var(--space-6);">
        Fått inn penger utenom det vanlige? Bruk sliderne til å fordele beløpet mellom ulike kategorier.
      </p>

      <section class="section">
        <h3>Beløp</h3>
        <!-- ds-field kobler label og input med riktige aria-attributter automatisk -->
        <ds-field class="field-group">
          <label>Hvor mye har du fått?</label>
          <input id="amount" type="number" class="ds-input" min="0" step="1000" placeholder="f.eks. 50000">
        </ds-field>
      </section>

      <section class="section">
        <h3>Fordeling</h3>
        <div id="bar-wrap"></div>
        <div id="kategori-liste"></div>
        <div style="margin-top: var(--space-3); display: flex; gap: var(--space-3);">
          <!-- data-variant="secondary": outlined-knapp -->
          <button id="legg-til-btn" class="ds-button" type="button" data-variant="secondary">+ Legg til kategori</button>
          <button id="nullstill-btn" class="ds-button" type="button" data-variant="secondary">Nullstill fordeling</button>
        </div>
      </section>

      <section class="section" id="oppsummering-section" style="display: none;">
        <h3>Oppsummering</h3>
        <div class="result-card" id="oppsummering-innhold"></div>
      </section>

      <div class="privacy-notice">
        <p>Dataene dine lagres kun lokalt i nettleseren din. Ingenting sendes til noen server.</p>
      </div>

    </div>
  </div>

  <script>
    const STORAGE_KEY = 'pengeprat_uventet_sum';

    const COLORS = [
      '#6a9fb5', '#7ab56a', '#b5916a', '#b56a8a', '#8a6ab5', '#6ab5a5',
    ];

    const DEFAULT_CATEGORIES = [
      { id: 'buffer',             name: 'Buffer',              percent: 25, color: COLORS[0] },
      { id: 'guiltFree',          name: 'Guilt-free spending', percent: 20, color: COLORS[1] },
      { id: 'ferie',              name: 'Ferie',               percent: 20, color: COLORS[2] },
      { id: 'storeLivshendelser', name: 'Store livshendelser', percent: 20, color: COLORS[3] },
      { id: 'pensjon',            name: 'Pensjon',             percent: 15, color: COLORS[4] },
    ];

    function lastState() {
      try {
        const lagret = localStorage.getItem(STORAGE_KEY);
        if (lagret) {
          const data = JSON.parse(lagret);
          // Migrasjon: legg til locked:false på kategorier som mangler feltet
          if (data.categories) {
            data.categories = data.categories.map(k => ({ locked: false, ...k }));
          }
          return data;
        }
      } catch {}
      return { amount: 0, categories: klonaKategorier() };
    }

    function lagreState() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
    }

    function klonaKategorier() {
      return DEFAULT_CATEGORIES.map(k => ({ ...k, locked: false }));
    }

    function formatKr(n) {
      return Math.round(n).toLocaleString('nb-NO') + ' kr';
    }

    function genId() {
      return Math.random().toString(36).slice(2, 9);
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Når én slider flyttes låses den; kun frie kategorier redistribueres
    function normaliserProsenter(endretId, nyProsent) {
      const låsteAndre = state.categories.filter(k => k.id !== endretId &&  k.locked);
      const frie       = state.categories.filter(k => k.id !== endretId && !k.locked);

      const låstTotal   = låsteAndre.reduce((s, k) => s + k.percent, 0);
      const faktiskPros = Math.min(nyProsent, 100 - låstTotal);
      const gjenværende = 100 - låstTotal - faktiskPros;

      const friTotal = frie.reduce((s, k) => s + k.percent, 0);

      state.categories = state.categories.map(k => {
        if (k.id === endretId) return { ...k, percent: faktiskPros, locked: true };
        if (k.locked)          return k;
        if (frie.length === 0) return k;
        if (friTotal === 0)    return { ...k, percent: Math.round(gjenværende / frie.length) };
        return { ...k, percent: Math.round(gjenværende * (k.percent / friTotal)) };
      });
    }

    // --- State ---
    let state = lastState();

    // --- DOM-refs ---
    const amountInput    = document.getElementById('amount');
    const barWrap        = document.getElementById('bar-wrap');
    const kategoriListe  = document.getElementById('kategori-liste');
    const leggTilBtn     = document.getElementById('legg-til-btn');
    const nullstillBtn   = document.getElementById('nullstill-btn');
    const oppSeksjon     = document.getElementById('oppsummering-section');
    const oppInnhold     = document.getElementById('oppsummering-innhold');

    // --- Startverdi på inputs ---
    amountInput.value = state.amount || '';

    // --- Statiske lyttere ---
    amountInput.addEventListener('input', () => {
      state.amount = Number(amountInput.value) || 0;
      lagreState();
      render();
    });

    leggTilBtn.addEventListener('click', () => {
      state.categories.push({
        id:      genId(),
        name:    '',
        percent: 0,
        locked:  false,
        color:   COLORS[state.categories.length % COLORS.length],
      });
      lagreState();
      render();
    });

    nullstillBtn.addEventListener('click', () => {
      state.categories = klonaKategorier();
      lagreState();
      render();
    });

    // Oppdater slider-verdier og visning uten å gjenskape DOM
    function updateSliderDisplays() {
      const harBeløp = state.amount > 0;
      state.categories.forEach(k => {
        const item = kategoriListe.querySelector(`[data-id="${k.id}"]`);
        if (!item) return;
        const slider = item.querySelector('.kat-slider');
        if (slider) slider.value = k.percent;
        const verdiEl = item.querySelector('.slider-verdi');
        if (verdiEl) {
          const krVerdi = Math.round(state.amount * k.percent / 100);
          verdiEl.innerHTML = harBeløp
            ? `<span class="beløp-stor">${krVerdi.toLocaleString('nb-NO')} kr</span>`
            : `<span class="beløp-stor">${k.percent}%</span>`;
        }
      });
    }

    // --- Render ---
    function render() {
      renderBar();
      renderKategorier();
      renderOppsummering();
    }

    function renderBar() {
      if (state.amount <= 0) { barWrap.innerHTML = ''; return; }
      const segmenter = state.categories
        .map(k => `<div class="bar-segment" style="width:${k.percent}%;background:${k.color};"></div>`)
        .join('');
      barWrap.innerHTML = `<div class="bar-container" style="margin-bottom:var(--space-5);">${segmenter}</div>`;
    }

    function renderKategorier() {
      // Kategori-navn-inputet bruker inline style for å blende inn med bakgrunnen.
      // var(--text) og var(--font) er begge bridget til DS-tokens i style.css,
      // så de vil automatisk bruke lyst tema-fargene.
      kategoriListe.innerHTML = state.categories.map(k => {
        const harBeløp = state.amount > 0;
        const krVerdi  = Math.round(state.amount * k.percent / 100);
        const visVerdi = harBeløp
          ? `<span class="beløp-stor">${krVerdi.toLocaleString('nb-NO')} kr</span>`
          : `<span class="beløp-stor">${k.percent}%</span>`;
        const minLabel = harBeløp ? '0 kr' : '0%';
        const maxLabel = harBeløp ? formatKr(state.amount) : '100%';
        return `
        <div class="goal-item" data-id="${k.id}">
          <div class="goal-header">
            <div style="display:flex;align-items:center;gap:var(--space-2);flex:1;">
              <div style="width:10px;height:10px;border-radius:50%;background:${k.color};flex-shrink:0;"></div>
              <input
                type="text"
                class="kat-navn"
                data-id="${k.id}"
                placeholder="Kategorinavn"
                value="${esc(k.name)}"
                style="background:transparent;border:none;color:var(--text);font-family:var(--font);font-size:0.85rem;font-weight:500;padding:0;outline:none;flex:1;"
              >
            </div>
            <div style="display:flex;align-items:center;gap:var(--space-2);">
              ${k.locked ? `<button class="goal-remove kat-lås-opp" type="button" data-id="${k.id}">lås opp</button>` : ''}
              <button class="goal-remove kat-fjern" type="button" data-id="${k.id}">fjern</button>
            </div>
          </div>
          <div class="slider-wrapper">
            <div class="slider-verdi">${visVerdi}</div>
            <input
              type="range"
              class="kat-slider full-width"
              data-id="${k.id}"
              min="0" max="100"
              value="${k.percent}"
            >
            <div class="slider-labels">
              <span>${minLabel}</span>
              <span>${maxLabel}</span>
            </div>
          </div>
        </div>
      `}).join('');

      // Koblinger til dynamisk genererte elementer
      kategoriListe.querySelectorAll('.kat-navn').forEach(input => {
        input.addEventListener('input', e => {
          const kat = state.categories.find(k => k.id === e.target.dataset.id);
          if (kat) kat.name = e.target.value;
          lagreState();
        });
      });

      kategoriListe.querySelectorAll('.kat-slider').forEach(slider => {
        // input: smooth patching under drag (ingen DOM-gjenskaping)
        slider.addEventListener('input', e => {
          normaliserProsenter(e.target.dataset.id, Number(e.target.value));
          lagreState();
          updateSliderDisplays();
          renderBar();
          renderOppsummering();
        });
        // change: full re-render ved slipp, slik at «lås opp»-knapper vises
        slider.addEventListener('change', () => render());
      });

      kategoriListe.querySelectorAll('.kat-fjern').forEach(btn => {
        btn.addEventListener('click', e => {
          const gjenværende = state.categories.filter(k => k.id !== e.target.dataset.id);
          if (gjenværende.length === 0) return;
          const total = gjenværende.reduce((s, k) => s + k.percent, 0);
          // Nullstill låser og redistribuer proporsjonalt etter strukturendring
          state.categories = gjenværende.map(k => ({
            ...k,
            locked:  false,
            percent: total === 0
              ? Math.round(100 / gjenværende.length)
              : Math.round(k.percent * (100 / total)),
          }));
          lagreState();
          render();
        });
      });

      kategoriListe.querySelectorAll('.kat-lås-opp').forEach(btn => {
        btn.addEventListener('click', e => {
          const kat = state.categories.find(k => k.id === e.target.dataset.id);
          if (kat) { kat.locked = false; lagreState(); render(); }
        });
      });
    }

    function renderOppsummering() {
      if (state.amount <= 0) { oppSeksjon.style.display = 'none'; return; }
      oppSeksjon.style.display = '';

      const rader = state.categories
        .filter(k => k.percent > 0)
        .map(k => `
          <div class="result-row">
            <span class="result-label">${esc(k.name) || 'Uten navn'}</span>
            <span class="result-value">${formatKr(state.amount * k.percent / 100)}</span>
          </div>
        `).join('');

      oppInnhold.innerHTML = rader + `
        <div class="result-row" style="border-top:1px solid var(--border);margin-top:var(--space-2);padding-top:var(--space-3);">
          <span class="result-label">Totalt</span>
          <span class="result-value accent">${formatKr(state.amount)}</span>
        </div>
      `;
    }

    render();
  </script>
</body>
</html>
